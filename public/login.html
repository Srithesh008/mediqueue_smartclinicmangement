<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SmartCare</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1A5276 0%, #2E86C1 60%, #1a9e6e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .auth-header {
      padding: 32px 36px 24px;
      text-align: center;
    }

    .auth-body {
      padding: 0 36px 36px;
    }

    .auth-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 20px;
    }

    .tab-switch {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-weight: 600;
      font-size: .875rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }


    .password-wrap {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .field-error {
      color: #e74c3c;
      font-size: .8125rem;
      margin-top: 4px;
      display: none;
    }

    .field-error.visible {
      display: block;
    }

    .form-control.input-error {
      border-color: #e74c3c;
      box-shadow: 0 0 0 2px rgba(231, 76, 60, .15);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 20px;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }
    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(46,134,193,.06);
      box-shadow: var(--shadow);
    }
    .back-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .back-btn span { display: none; }
      .back-btn { padding: 8px 10px; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">
        <svg viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#2E86C1" />
          <path d="M20 10v20M10 20h20" stroke="white" stroke-width="4" stroke-linecap="round" />
        </svg>
        Smart<span>Care</span>
      </a>
      <a href="/" class="btn btn-ghost btn-sm">← Back to Home</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Back</span>
    </button>
    <div class="auth-card animate-in">
      <div class="auth-header">
        <div class="auth-icon">🏥</div>
        <h2>Welcome Back</h2>
        <p style="color:var(--text-muted);font-size:.9375rem;margin-top:6px">Sign in to your SmartCare account</p>
      </div>
      <div class="auth-body">


        <div id="alertBox"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
            <span class="field-error" id="emailError">Please enter a valid email address (e.g., name@example.com)</span>
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between">
              Password
              <a href="#" style="font-weight:400;font-size:.8125rem;color:var(--primary)">Forgot password?</a>
            </label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="password" placeholder="••••••••" required />
              <button type="button" class="password-toggle" onclick="togglePwd()">👁</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
            <input type="checkbox" id="rememberMe" style="width:16px;height:16px" />
            <label for="rememberMe" style="font-size:.875rem;color:var(--text-secondary)">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
            Sign In
          </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:.9375rem;color:var(--text-muted)">
          Don't have an account?
          <a href="/register.html" style="color:var(--primary);font-weight:600">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    function goBack() {
      window.location.href = '/';
    }

    // Redirect if already logged in
    if (Auth.isLoggedIn()) redirectByRole(Auth.getRole());

    function redirectByRole(role) {
      if (role === 'doctor') location.href = '/doctor-dashboard.html';
      else if (role === 'admin') location.href = '/admin-panel.html';
      else location.href = '/patient-dashboard.html';
    }


    function togglePwd() {
      const inp = $('#password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // Email validation helper
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Real-time email validation on blur
    $('#email').addEventListener('blur', function () {
      const val = this.value.trim();
      const errEl = $('#emailError');
      if (val && !isValidEmail(val)) {
        this.classList.add('input-error');
        errEl.classList.add('visible');
      } else {
        this.classList.remove('input-error');
        errEl.classList.remove('visible');
      }
    });

    // Clear error on input
    $('#email').addEventListener('input', function () {
      this.classList.remove('input-error');
      $('#emailError').classList.remove('visible');
    });

    $('#loginForm').addEventListener('submit', async e => {
      e.preventDefault();

      const emailVal = $('#email').value.trim();
      const errEl = $('#emailError');

      // Validate email format before submitting
      if (!emailVal) {
        setHTML('#alertBox', '<div class="alert alert-danger">❌ Please enter your email address.</div>');
        $('#email').classList.add('input-error');
        return;
      }
      if (!isValidEmail(emailVal)) {
        $('#email').classList.add('input-error');
        errEl.classList.add('visible');
        setHTML('#alertBox', '<div class="alert alert-danger">❌ Please enter a valid email address (e.g., name@example.com).</div>');
        return;
      }

      const btn = $('#loginBtn');
      btn.innerHTML = '<span class="loader"></span> Signing In...';
      btn.disabled = true;

      const data = await api.post('/auth/login', {
        email: emailVal,
        password: $('#password').value
      }, false);

      btn.innerHTML = 'Sign In';
      btn.disabled = false;

      if (!data) return;
      if (!data.success) {
        setHTML('#alertBox', `<div class="alert alert-danger">❌ ${data.message}</div>`);
        return;
      }

      Auth.setSession(data.token, data.user);
      Toast.show('Login successful! Redirecting...', 'success');
      setTimeout(() => redirectByRole(data.user.role), 800);
    });
  </script>
</body>

</html>
